<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Live Pixel CRT Logo</title>
    <style>
        body { 
            background: #050505; 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        }
        .canvas-container { 
            width: 400px; 
            height: 400px; 
            border-radius: 50%; 
            overflow: hidden; 
            border: 2px solid rgba(255,170,50,0.5); 
            box-shadow: 0 0 60px rgba(255,170,50,0.15); 
            margin-bottom: 3rem; 
            position: relative;
            background: #000;
        }
        canvas { 
            width: 100%; 
            height: 100%; 
            image-rendering: pixelated; 
        }
        .dropzone { 
            border: 2px dashed rgba(255,255,255,0.2); 
            padding: 2.5rem 4rem; 
            border-radius: 20px; 
            text-align: center; 
            color: rgba(255,255,255,0.6); 
            font-size: 1.2rem;
            cursor: pointer; 
            transition: all 0.3s ease;
        }
        .dropzone.dragover { 
            border-color: #ffaa32; 
            background: rgba(255,170,50,0.1); 
            color: #fff; 
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    
    <div class="canvas-container">
        <canvas id="live-logo" width="100" height="100"></canvas>
    </div>
    
    <div id="dropzone" class="dropzone">
        <strong>Перетащи сюда картинку Зевса</strong><br>
        <span style="font-size: 0.9rem; opacity: 0.6; margin-top: 8px; display: inline-block;">
            чтобы скрипт сгенерировал лампово-пиксельную анимацию
        </span>
    </div>

    <script>
        const canvas = document.getElementById('live-logo');
        const ctx = canvas.getContext('2d');
        const dropzone = document.getElementById('dropzone');
        let currentImg = new Image();
        
        let time = 0;
        let animationId;
        
        // Text placeholder
        function drawPlaceholder() {
            const w = canvas.width; const h = canvas.height;
            ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0,0,w,h);
            ctx.fillStyle = '#ffaa32'; ctx.font = '20px sans-serif'; ctx.textAlign='center'; ctx.fillText('ZEUS', w/2, h/2+8);
        }
        drawPlaceholder();

        function startEffect() {
            if (animationId) cancelAnimationFrame(animationId);
            
            function renderLogo() {
                time += 0.05;
                const w = canvas.width;
                const h = canvas.height;
                
                ctx.clearRect(0, 0, w, h);
                
                const pxSize = 2; // Higher number = more blocky pixels
                const sW = w / pxSize;
                const sH = h / pxSize;
                
                const off = document.createElement('canvas');
                off.width = sW; off.height = sH;
                const offCtx = off.getContext('2d');
                
                // Draw image scaled to fit and centered
                const scale = Math.max(sW / currentImg.width, sH / currentImg.height);
                const drawW = currentImg.width * scale;
                const drawH = currentImg.height * scale;
                const x = (sW / 2) - (drawW / 2);
                const y = (sH / 2) - (drawH / 2);
                
                offCtx.drawImage(currentImg, x, y, drawW, drawH);
                
                // Draw back scaled up without smoothing
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(off, 0, 0, sW, sH, 0, 0, w, h);
                
                // CRT warm tint overlay
                ctx.globalCompositeOperation = 'color';
                ctx.fillStyle = `rgba(255, 140, 20, ${0.4 + Math.sin(time)*0.1})`;
                ctx.fillRect(0, 0, w, h);
                ctx.globalCompositeOperation = 'source-over';
                
                // Scanlines
                ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                for(let y = 0; y < h; y += 4) {
                    ctx.fillRect(0, y + (time * 15) % 4, w, 2);
                }
                
                // RGB split glitch
                if (Math.random() > 0.95) {
                    ctx.globalCompositeOperation = 'screen';
                    ctx.fillStyle = 'rgba(255,60,0,0.3)';
                    ctx.fillRect((Math.random()-0.5)*10, 0, w, h);
                    ctx.globalCompositeOperation = 'source-over';
                }
                
                animationId = requestAnimationFrame(renderLogo);
            }
            renderLogo();
        }

        // Setup Drag and Drop
        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.classList.add('dragover');
        });
        dropzone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
        });
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
            
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    currentImg.onload = startEffect;
                    currentImg.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
